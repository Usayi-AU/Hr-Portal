{% extends 'core/dashboard_base.html' %}

{% block dashboard_content %}
<div class="mx-auto max-w-xl">
    <div class="rounded-2xl bg-white p-6 shadow-sm transition-all sm:p-8">
        <div class="mb-6 flex items-center gap-3">
            <div class="flex h-12 w-12 items-center justify-center rounded-full bg-red-100">
                <span class="text-2xl">🗑️</span>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Confirm Deletion</h1>
                <p class="text-sm text-slate-600">This action cannot be undone</p>
            </div>
        </div>
        
        <div class="mb-8 rounded-lg border-l-4 border-red-500 bg-red-50 p-4">
            <p class="text-sm font-semibold text-red-900">Warning</p>
            <p class="mt-1 text-sm text-red-800">Are you sure you want to permanently delete this record? This action is irreversible.</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div class="flex gap-3 pt-2">
                <button type="submit" class="inline-flex items-center gap-2 rounded-lg bg-gradient-to-r from-red-600 to-red-700 px-6 py-3 font-semibold text-white transition-all hover:shadow-lg">
                    <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                    </svg>
                    Yes, Delete Permanently
                </button>
                <a href="{{ cancel_url }}" class="inline-flex items-center gap-2 rounded-lg border border-slate-300 px-6 py-3 font-semibold text-slate-700 transition-all hover:bg-slate-50">
                    <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
