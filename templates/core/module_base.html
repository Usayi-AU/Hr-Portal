{% extends 'core/dashboard_base.html' %}

{% block dashboard_content %}
<div class="rounded-2xl bg-white/95 border border-slate-200 p-4 shadow-sm transition-all hover:shadow-md sm:p-6">
    <div class="mb-6 flex flex-wrap items-center justify-between gap-3 border-b border-slate-100 pb-4">
        <div>
            <h2 class="text-xl font-semibold text-slate-900">{{ page_title }}</h2>
            <p class="mt-1 text-xs text-slate-600">Manage your {{ page_title|lower }}</p>
        </div>
        {% if can_create %}
        <a href="{{ create_url }}" class="inline-flex items-center gap-2 rounded-md btn-primary px-3.5 py-2 text-xs font-semibold text-white">
            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
            </svg>
            Add New
        </a>
        {% endif %}
    </div>
    {% block module_content %}{% endblock %}
</div>
{% endblock %}
