services:

* type: web
  name: hr-portal
  runtime: python

  buildCommand: |
  pip install -r requirements.txt
  python manage.py collectstatic --noinput

  preDeployCommand: |
  python manage.py migrate

  startCommand: gunicorn config.wsgi:application --log-file -

  envVars:

  * key: SECRET_KEY
    generateValue: true

  * key: DEBUG
    value: "False"

  * key: ALLOWED_HOSTS
    value: ".onrender.com"

  * key: PYTHON_VERSION
    value: "3.11.9"

databases:

* name: hr-portal-db
  databaseName: hr_portal
  user: hr_portal
